<!-- Service Worker para funcionar offline -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'agendaglow-v2';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])).catch(()=>{}));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}
</script>

<style>
  :root{
    --bg-0:#0F0D12;
    --bg-1:#171319;
    --bg-2:#1F1922;
    --bg-card:#211B26;
    --line:rgba(245,240,232,0.09);
    --line-strong:rgba(245,240,232,0.16);
    --gold:#E8C4A0;
    --gold-deep:#C99A6C;
    --lilac:#C77DFF;
    --lilac-deep:#9D4EDD;
    --text-0:#F5F0E8;
    --text-1:#C9C2D1;
    --text-2:#8B8594;
    --success:#7FD9A8;
    --danger:#E8849A;
    --radius-sm:10px;
    --radius-md:16px;
    --radius-lg:24px;
    --serif:'Fraunces', serif;
    --sans:'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg-0); color:var(--text-0); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100%; max-width:100vw; overflow-x:hidden;}
  /* FIX: viewport dinâmica para iOS/Android — resolve tela cortando */
  #root{min-height:100vh; min-height:100dvh; min-height:-webkit-fill-available; max-width:100vw; overflow-x:hidden;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::selection{background:var(--lilac-deep); color:white;}
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg-0);}
  ::-webkit-scrollbar-thumb{background:var(--bg-2); border-radius:8px;}
  .serif{font-family:var(--serif);}
  .container{max-width:1180px; margin:0 auto; padding:0 28px;}
  @media (max-width:720px){ .container{padding:0 18px;} }

  /* glow signature element */
  .glow-ring{
    position:absolute; border-radius:50%;
    filter: blur(60px);
    opacity:0.55;
    pointer-events:none;
  }
  @keyframes drift{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(20px,-16px) scale(1.06); }
  }
  @keyframes pulse-soft{
    0%,100%{ opacity:0.4; }
    50%{ opacity:0.7; }
  }
  .reveal{
    opacity:0; transform: translateY(14px);
    animation: revealUp 0.7s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes revealUp{ to{ opacity:1; transform:translateY(0); } }

  @media (prefers-reduced-motion: reduce){
    .glow-ring{ animation:none !important; }
    .reveal{ animation:none !important; opacity:1; transform:none; }
  }

  input[type=text], input[type=email], input[type=password], input[type=tel], input[type=number], input[type=date], input[type=time], select, textarea{
    width:100%;
    background: var(--bg-1);
    border:1px solid var(--line-strong);
    color:var(--text-0);
    border-radius: var(--radius-sm);
    padding:11px 14px;
    font-size:14.5px;
    outline:none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  input::placeholder, textarea::placeholder{ color:var(--text-2); }
  input:focus, select:focus, textarea:focus{
    border-color: var(--lilac-deep);
    box-shadow: 0 0 0 3px rgba(157,78,221,0.18);
  }
  label{ font-size:13px; color:var(--text-1); display:block; margin-bottom:6px; font-weight:500; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; border-radius: var(--radius-sm);
    font-weight:600; font-size:14.5px;
    padding:12px 22px;
    transition: transform .15s ease, opacity .15s ease, box-shadow .15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{
    background: linear-gradient(135deg, var(--lilac) 0%, var(--lilac-deep) 100%);
    color:#fff;
    box-shadow: 0 8px 24px -8px rgba(157,78,221,0.55);
  }
  .btn-primary:hover{ box-shadow: 0 10px 28px -6px rgba(157,78,221,0.7); }
  .btn-gold{
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-deep) 100%);
    color:#241A12;
    box-shadow: 0 8px 24px -8px rgba(232,196,160,0.45);
  }
  .btn-ghost{
    background: transparent; color:var(--text-0);
    border:1px solid var(--line-strong);
  }
  .btn-ghost:hover{ background: var(--bg-2); }
  .btn-block{ width:100%; }
  .btn-sm{ padding:8px 14px; font-size:13px; }

  .card{
    background: var(--bg-card);
    border:1px solid var(--line);
    border-radius: var(--radius-md);
    padding:24px;
  }

  .badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; font-weight:600;
    padding:5px 11px; border-radius:100px;
  }
  .badge-gold{ background: rgba(232,196,160,0.14); color:var(--gold); border:1px solid rgba(232,196,160,0.3); }
  .badge-lilac{ background: rgba(199,125,255,0.14); color:var(--lilac); border:1px solid rgba(199,125,255,0.3); }
  .badge-success{ background: rgba(127,217,168,0.14); color:var(--success); border:1px solid rgba(127,217,168,0.3); }
  .badge-danger{ background: rgba(232,132,154,0.14); color:var(--danger); border:1px solid rgba(232,132,154,0.3); }
  .badge-gray{ background: var(--bg-2); color:var(--text-2); border:1px solid var(--line); }
  .badge-warning{ background: rgba(240,180,41,0.14); color:#f0b429; border:1px solid rgba(240,180,41,0.3); }

  table{ width:100%; border-collapse:collapse; }
  /* FIX: tabelas largas (muitas colunas) rolam por dentro do próprio card em vez de
     empurrar a página inteira para o lado no celular. */
  .table-wrap{ width:100%; max-width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .table-wrap table{ min-width:560px; }
  th{ text-align:left; font-size:12px; color:var(--text-2); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; padding:10px 12px; border-bottom:1px solid var(--line); }
  td{ padding:13px 12px; font-size:14px; border-bottom:1px solid var(--line); }
  tr:last-child td{ border-bottom:none; }

  .icon{ width:18px; height:18px; display:inline-block; vertical-align:middle; }

  .toast{
    position:fixed; bottom:24px; right:24px; z-index:999;
    background: var(--bg-card); border:1px solid var(--line-strong);
    border-radius: var(--radius-sm); padding:14px 18px;
    display:flex; align-items:center; gap:10px;
    box-shadow: 0 12px 32px -8px rgba(0,0,0,0.5);
    animation: toastIn .3s cubic-bezier(.16,1,.3,1);
    font-size:14px;
  }
  @keyframes toastIn{ from{ opacity:0; transform: translateY(12px);} to{ opacity:1; transform:none; } }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(8,6,10,0.7);
    display:flex; align-items:center; justify-content:center;
    z-index:998; padding:20px; backdrop-filter: blur(4px);
  }
  .modal{
    background: var(--bg-card); border:1px solid var(--line-strong);
    border-radius: var(--radius-md); padding:28px;
    max-width:480px; width:100%; max-height:88vh; overflow-y:auto;
    animation: modalIn .25s cubic-bezier(.16,1,.3,1);
  }
  @keyframes modalIn{ from{ opacity:0; transform: scale(0.96) translateY(8px); } to{ opacity:1; transform:none; } }

  .sidebar-link{
    display:flex; align-items:center; gap:11px;
    padding:10px 14px; border-radius:var(--radius-sm);
    font-size:14px; font-weight:500; color:var(--text-1);
    transition: background .15s ease, color .15s ease;
  }
  .sidebar-link:hover{ background: var(--bg-2); color:var(--text-0); }
  .sidebar-link.active{ background: rgba(199,125,255,0.12); color:var(--lilac); }
  /* FIX main-content: nunca corta no mobile (min-width:0 evita que o flex item estoure pelo conteúdo) */
  .main-content{ flex:1; min-width:0; max-width:100%; min-height:100vh; min-height:100dvh; padding:28px 32px; padding-top:calc(28px + env(safe-area-inset-top)); padding-bottom:calc(28px + env(safe-area-inset-bottom)); overflow-x:hidden; }

  .tab{
    padding:9px 18px; border-radius:100px; font-size:13.5px; font-weight:600;
    color:var(--text-2); cursor:pointer; transition: all .15s ease;
    border:1px solid transparent;
  }
  .tab.active{ background: var(--bg-2); color:var(--text-0); border-color:var(--line-strong); }

  .skel{ background: linear-gradient(90deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%); background-size:200% 100%; animation: skel 1.4s ease infinite; border-radius:8px; }
  @keyframes skel{ to{ background-position: -200% 0; } }

  @media (max-width:900px){ .nav-desktop a { display: none; } }
  @media (max-width: 860px) {
    .sidebar-desktop { transform: translateX(-100%) !important; }
    .main-content { margin-left: 0 !important; padding: 18px 16px !important; padding-top: calc(18px + env(safe-area-inset-top)) !important; padding-bottom: calc(18px + env(safe-area-inset-bottom)) !important; max-width: 100vw !important; }
    .menu-toggle { display: inline-flex !important; }
    .admin-grid { grid-template-columns: 1fr !important; }
    .card { max-width: 100%; }
    .stat-card { min-width: 130px !important; }
    .topbar-title { font-size: 20px !important; }
    .topbar-row { margin-bottom: 18px !important; }
    .table-wrap { position: relative; }
    .table-wrap::after {
      content: ""; position: absolute; top: 0; right: 0; bottom: 0; width: 24px; pointer-events: none;
      background: linear-gradient(to right, transparent, var(--bg-card, var(--bg-1)) 85%);
    }
  }
  @media (max-width: 380px) {
    .stat-card { min-width: 100% !important; }
    .topbar-title { font-size: 18px !important; }
  }
  @media (min-width: 861px) { .sidebar-desktop { transform: translateX(0) !important; } }
</style>
</head>

const todayISO = () => new Date().toISOString().slice(0, 10);

// Monta um link wa.me com mensagem pronta — abre o WhatsApp de verdade pra você confirmar
// manualmente com o cliente. Não existe envio automático: é só um atalho prático.
function buildWhatsappLink(phone, message) {
  const digits = (phone || "").replace(/\D/g, "");
  const withCountry = digits.startsWith("55") ? digits : `55${digits}`;
  return `https://wa.me/${withCountry}?text=${encodeURIComponent(message)}`;
}

    plan: row.plan,

      name: studioName,
      slug,
      plan,
      plan_status: "ativo",

function Toast({ toast }) {
  if (!toast) return null;
  const color = toast.type === "error" ? "var(--danger)" : toast.type === "info" ? "var(--lilac)" : "var(--success)";
  const icon = toast.type === "error" ? "x" : toast.type === "info" ? "info" : "check";
  return (
    <div className="toast" key={toast.key}>
      <span style={{ color }}><Icon name={icon} size={18} /></span>
      <span>{toast.msg}</span>
    </div>
  );
}

function Modal({ onClose, children, width }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [onClose]);
  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={width ? { maxWidth: width } : {}}>
        {children}
      </div>
    </div>
  );
}

function SignupScreen({ initialPlan, onBack, onComplete }) {
  const [step, setStep] = useState(1);

  const [ownerName, setOwnerName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");

  const [payMethod, setPayMethod] = useState("pix");
  const [loading, setLoading] = useState(false);
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");

  const canStep1 = studioName.trim().length >= 2 && ownerName.trim().length >= 2 && email.includes("@") && password.length >= 6;

  const handleFinish = async () => {
    setLoading(true);
    setError("");
    try {
      await onComplete({ studioName, ownerName, email: email.trim(), password, plan, payMethod });
    } catch (e) {
      setError(e?.message === "User already registered" ? "Este e-mail já está cadastrado. Tente entrar." : "Não foi possível concluir o cadastro. Tente novamente.");
      setLoading(false);
    }
  };

  return (
    <AuthShell onBack={onBack}>
      <div className="card" style={{ padding: 32 }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
          {[1, 2].map(s => (
            <div key={s} style={{ flex: 1, height: 4, borderRadius: 4, background: step >= s ? "var(--lilac)" : "var(--bg-2)" }} />
          ))}
        </div>

        {step === 1 && (
          <>
            <h2 className="serif" style={{ fontSize: 24, fontWeight: 500, marginBottom: 6 }}>Crie sua agenda</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", marginBottom: 24 }}>Use o nome que seus clientes vão ver — pode ser o nome do seu studio ou o seu nome.</p>
            <Field label="Nome do studio (ou seu nome)">
              <input type="text" placeholder="Ex: Studio Camila Estética" value={studioName} onChange={e => setStudioName(e.target.value)} />
            </Field>
            <Field label="Seu nome completo">
              <input type="text" placeholder="Seu nome" value={ownerName} onChange={e => setOwnerName(e.target.value)} />
            </Field>
            <Field label="E-mail">
              <input type="email" placeholder="voce@email.com" value={email} onChange={e => setEmail(e.target.value)} />
            </Field>
            <Field label="Senha">
              <div style={{ position: "relative" }}>
                <input type={showPw ? "text" : "password"} placeholder="Mínimo 6 caracteres" value={password} onChange={e => setPassword(e.target.value)} style={{ paddingRight: 42 }} />
                <button onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 10, top: 9, background: "none", border: "none", color: "var(--text-2)" }} tabIndex={-1} aria-label={showPw ? "Ocultar senha" : "Mostrar senha"}>
                  <Icon name={showPw ? "eyeOff" : "eye"} size={17} />
                </button>
              </div>
            </Field>
            <button className="btn btn-primary btn-block" disabled={!canStep1} style={{ opacity: canStep1 ? 1 : 0.5, marginTop: 8 }} onClick={() => setStep(2)}>
              Continuar <Icon name="arrowRight" size={15} />
            </button>
          </>
        )}

        {step === 2 && (
          <>
            <h2 className="serif" style={{ fontSize: 24, fontWeight: 500, marginBottom: 6 }}>Escolha seu plano</h2>
            <p style={{ fontSize: 14, color: "var(--text-2)", marginBottom: 20 }}>Sem fidelidade no mensal. Cancele quando quiser.</p>
            <PlanPicker value={plan} onChange={setPlan} />
            <label style={{ marginTop: 4 }}>Forma de pagamento</label>
            <PaymentPicker value={payMethod} onChange={setPayMethod} />
            <div className="card" style={{ background: "var(--bg-1)", padding: 16, margin: "18px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <p style={{ fontSize: 13, color: "var(--text-2)" }}>Total {plan === "anual" ? "por ano" : "por mês"}</p>
                <p className="serif" style={{ fontSize: 22, fontWeight: 500 }}>{fmtBRL(plan === "anual" ? PLAN_PRICES.anual : PLAN_PRICES.mensal)}</p>
              </div>
              <span className="badge badge-success"><Icon name="shield" size={12} /> Pagamento seguro</span>
            </div>
            {error && <div className="badge badge-danger" style={{ marginBottom: 14, display: "flex" }}>{error}</div>}
            <button className="btn btn-primary btn-block" onClick={handleFinish} disabled={loading} style={{ opacity: loading ? 0.7 : 1 }}>
              {loading ? "Confirmando assinatura..." : `Assinar e criar minha agenda`}
            </button>
            <button className="btn btn-ghost btn-block" style={{ marginTop: 10 }} onClick={() => setStep(1)} disabled={loading}>Voltar</button>
          </>
        )}
      </div>
    </AuthShell>
  );

function LoginScreen({ onBack, onLogin, onForgot, role }) {

  );

function ActivateAccountScreen({ onBack, onActivated }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const canSubmit = email.includes("@") && password.length >= 6 && password === confirmPassword;

  const submit = async () => {
    setError("");
    if (password !== confirmPassword) { setError("As senhas não coincidem."); return; }
    setLoading(true);
    try {
      const resp = await fetch("/api/activate-account", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email.trim(), password }),
      });
      const json = await resp.json();
      if (!resp.ok) { setError(json.error || "Não foi possível ativar sua conta."); setLoading(false); return; }
      setDone(true);
      setLoading(false);
    } catch (e) {
      setError("Erro de conexão. Tente novamente.");
      setLoading(false);
    }
  };

  if (done) {
    return (
      <AuthShell onBack={onBack}>
        <div className="card" style={{ padding: 32, textAlign: "center" }}>
          <div style={{ width: 56, height: 56, borderRadius: "50%", background: "rgba(127,217,168,0.14)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", color: "var(--success)" }}>
            <Icon name="check" size={26} />
          </div>
          <h2 className="serif" style={{ fontSize: 22, marginBottom: 10 }}>Senha criada com sucesso!</h2>
          <p style={{ color: "var(--text-1)", marginBottom: 20, fontSize: 14.5 }}>
            Agora você já pode entrar na sua agenda usando esse e-mail e a senha que você acabou de criar.
          </p>
          <button className="btn btn-primary btn-block" onClick={onActivated}>Entrar na minha agenda</button>
        </div>
      </AuthShell>
    );
  }

  return (
    <AuthShell onBack={onBack}>
      <div className="card" style={{ padding: 32 }}>
        <h2 className="serif" style={{ fontSize: 24, fontWeight: 500, marginBottom: 6 }}>Crie sua senha de acesso</h2>
        <p style={{ fontSize: 14, color: "var(--text-2)", marginBottom: 24 }}>
          Pagamento confirmado! Use o mesmo e-mail da sua compra para criar a senha e acessar sua agenda.
        </p>
        {error && <div className="badge badge-danger" style={{ marginBottom: 16, display: "flex" }}>{error}</div>}
        <Field label="E-mail usado na compra">
          <input type="email" placeholder="voce@email.com" value={email} onChange={e => { setEmail(e.target.value); setError(""); }} />
        </Field>
        <Field label="Crie sua senha">
          <div style={{ position: "relative" }}>

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
function isoToYearMonth(iso) { const [y,m] = iso.split("-"); return {year:parseInt(y), month:parseInt(m)}; }
function addMonths(iso, n) { const {year,month} = isoToYearMonth(iso); const d = new Date(year, month-1+n, 1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`; }
function getMonthDays(ym) { const {year,month} = isoToYearMonth(ym); const first = new Date(year,month-1,1).getDay(); const total = new Date(year,month,0).getDate(); const days=[]; for(let i=0;i<first;i++) days.push(null); for(let d=1;d<=total;d++) days.push(`${year}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`); return days; }

function MonthCalendar({ appointments, selectedDate, onSelect }) {
  const today = todayISO();
  const [curMonth, setCurMonth] = useState(today.slice(0,8)+"01");
  const {year, month} = isoToYearMonth(curMonth);
  const days = getMonthDays(curMonth);
  const weekDays = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const apptByDay = {};
  appointments.forEach(a => { apptByDay[a.date] = (apptByDay[a.date]||0)+1; });
  return (
    <div className="card" style={{padding:16, marginBottom:22}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={()=>setCurMonth(addMonths(curMonth,-1))} className="btn btn-ghost btn-sm" style={{padding:8}}><Icon name="chevronLeft" size={16}/></button>
        <span style={{fontWeight:600,fontSize:15}}>{MONTH_NAMES[month-1]} {year}</span>
        <button onClick={()=>setCurMonth(addMonths(curMonth,1))} className="btn btn-ghost btn-sm" style={{padding:8}}><Icon name="chevronRight" size={16}/></button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {weekDays.map(d=><div key={d} style={{textAlign:"center",fontSize:10.5,color:"var(--text-2)",fontWeight:600,padding:"3px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {days.map((iso,i)=>{
          if(!iso) return <div key={`e${i}`}/>;
          const isSel = iso===selectedDate, isToday = iso===today, count = apptByDay[iso]||0;
          return (
            <button key={iso} onClick={()=>onSelect(iso)} style={{
              aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              borderRadius:8,fontSize:12.5,fontWeight:isToday?700:500,cursor:"pointer",border:"1px solid transparent",
              background:isSel?"rgba(199,125,255,0.14)":"transparent",
              borderColor:isSel?"var(--lilac)":"transparent",
              color:isSel?"var(--lilac)":isToday?"var(--text-0)":"var(--text-1)",
              transition:"all .15s ease",
            }}>
              {iso.slice(8,10)}
              {count>0 && <div style={{width:4,height:4,borderRadius:"50%",background:"var(--lilac)",marginTop:1}}/>}
            </button>
          );
        })}
      </div>
      <div style={{marginTop:10,textAlign:"center"}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setCurMonth(today.slice(0,8)+"01");onSelect(today);}}>Ir para hoje</button>
      </div>
    </div>
  );
}

function AgendaTab({ studio, updateStudio, onMenu }) {
  const toast = useToast();
  const [selectedDate, setSelectedDate] = useState(todayISO());
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);

  const dayAppts = studio.appointments.filter(a => a.date === selectedDate).sort((a, b) => a.time.localeCompare(b.time));
const pendingAppts = studio.appointments.filter(a => a.status === "pendente").sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  const getClient = (id) => studio.clients.find(c => c.id === id);
  const getService = (id) => studio.services.find(s => s.id === id);

  const saveAppt = async (data) => {
    if (editing) {
      await DB.updateAppointment(editing.id, data);
      const appts = studio.appointments.map(a => a.id === editing.id ? { ...a, ...data } : a);
      updateStudio({ ...studio, appointments: appts });
      toast("Agendamento atualizado");
    } else {
      const created = await DB.createAppointment(studio.id, data);
      updateStudio({ ...studio, appointments: [...studio.appointments, created] });
      toast("Agendamento criado");
    }
    setModalOpen(false);
    setEditing(null);
  };

 const removeAppt = async (id) => {
      await DB.deleteAppointment(id);
      updateStudio({ ...studio, appointments: studio.appointments.filter(a => a.id !== id) });
      toast("Agendamento removido", "info");
    };

    const approveAppt = async (id) => {
      await DB.updateAppointment(id, { status: "confirmado" });
      updateStudio({ ...studio, appointments: studio.appointments.map(a => a.id === id ? { ...a, status: "confirmado" } : a) });
      toast("Agendamento confirmado");
    };

    const rejectAppt = async (id) => {
      await DB.updateAppointment(id, { status: "cancelado" });
      updateStudio({ ...studio, appointments: studio.appointments.map(a => a.id === id ? { ...a, status: "cancelado" } : a) });
      toast("Agendamento recusado", "info");
    };

  return (
    <div>

        <button className="btn btn-primary btn-sm" onClick={() => { setEditing(null); setModalOpen(true); }}>

     {pendingAppts.length > 0 && (
          <div className="card" style={{ marginBottom: 20, border: "1px solid rgba(240,180,41,0.35)", background: "rgba(240,180,41,0.06)" }}>
            <p style={{ fontWeight: 600, fontSize: 14.5, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
              <Icon name="clock" size={16} style={{ color: "#f0b429" }} />
              {pendingAppts.length} agendamento{pendingAppts.length > 1 ? "s" : ""} aguardando aprovação
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {pendingAppts.map(a => {
                const client = getClient(a.clientId), service = getService(a.serviceId);
                return (
                  <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", padding: 10, background: "var(--bg-1)", borderRadius: 8 }}>
                    <div style={{ flex: 1, minWidth: 160 }}>
                      <p style={{ fontWeight: 600, fontSize: 14 }}>{client?.name || "Cliente"}</p>
                      <p style={{ fontSize: 12.5, color: "var(--text-2)" }}>{service?.name} · {fmtDate(a.date)} às {a.time}</p>
                    </div>
                    <button className="btn btn-primary btn-sm" onClick={() => { approveAppt(a.id); if (client?.phone) window.open(buildWhatsappLink(client.phone, `Oi, ${(client?.name || "").split(" ")[0]}! Seu horário de ${service?.name} foi confirmado para o dia ${fmtDate(a.date)} às ${a.time}. Te esperamos!`), "_blank"); }}>Aceitar</button>
                    <button className="btn btn-ghost btn-sm" style={{ color: "var(--danger)" }} onClick={() => rejectAppt(a.id)}>Recusar</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}  <MonthCalendar appointments={studio.appointments} selectedDate={selectedDate} onSelect={setSelectedDate} />

      <div style={{marginBottom:14}}>
        <p style={{fontSize:13.5,color:"var(--text-2)"}}>

        </p>

      {dayAppts.length === 0 ? (
        <EmptyState icon="calendar" title="Nenhum horário neste dia" body="Crie um novo agendamento ou compartilhe seu link para que clientes marquem direto." action={
          <button className="btn btn-primary" onClick={() => setModalOpen(true)}><Icon name="plus" size={15} /> Novo agendamento</button>
        } />
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {dayAppts.map(a => {
            const client = getClient(a.clientId), service = getService(a.serviceId);

      await DB.updateService(editing.id, data);
      updateStudio({ ...studio, services: studio.services.map(s => s.id === editing.id ? { ...s, ...data } : s) });
      toast("Serviço atualizado");
    } else {
      const created = await DB.createService(studio.id, data);
      updateStudio({ ...studio, services: [...studio.services, created] });
      toast("Serviço cadastrado");
    }
    setModalOpen(false); setEditing(null);
  };
  const remove = async (id) => {
    await DB.deleteService(id);
    updateStudio({ ...studio, services: studio.services.filter(s => s.id !== id) });
    toast("Serviço removido", "info");
  };

  return (
    <div>
      <TopBar title="Serviços" onMenu={onMenu} right={
        <button className="btn btn-primary btn-sm" onClick={() => { setEditing(null); setModalOpen(true); }}><Icon name="plus" size={15} /> Novo serviço</button>
      } />
      {studio.services.length === 0 ? (
        <EmptyState icon="scissors" title="Nenhum serviço cadastrado" body="Cadastre os serviços que seu studio oferece para começar a receber agendamentos." action={
          <button className="btn btn-primary" onClick={() => setModalOpen(true)}><Icon name="plus" size={15} /> Novo serviço</button>
        } />
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 14 }}>
          {studio.services.map(s => (
            <div key={s.id} className="card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ width: 38, height: 38, borderRadius: 10, background: "rgba(232,196,160,0.14)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--gold)" }}>
                  <Icon name="scissors" size={17} />
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  <button className="btn btn-ghost btn-sm" style={{ padding: 6 }} onClick={() => { setEditing(s); setModalOpen(true); }} aria-label="Editar"><Icon name="edit" size={13} /></button>
                  <button className="btn btn-ghost btn-sm" style={{ padding: 6, color: "var(--danger)" }} onClick={() => remove(s.id)} aria-label="Excluir"><Icon name="trash" size={13} /></button>
                </div>
              </div>
              <p style={{ fontWeight: 600, fontSize: 15.5, marginTop: 14 }}>{s.name}</p>
              <div style={{ display: "flex", gap: 14, marginTop: 8, fontSize: 13, color: "var(--text-2)" }}>
                <span><Icon name="clock" size={13} style={{ marginRight: 4 }} />{s.duration} min</span>
                <span style={{ color: "var(--gold)", fontWeight: 600 }}>{fmtBRL(s.price)}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {modalOpen && <ServiceModal editing={editing} onClose={() => { setModalOpen(false); setEditing(null); }} onSave={save} />}
    </div>
  );
}

 const bs = billingStatus(fullStudio);

function platformStats(studios) {
  const active = studios.filter(s => s.planStatus === "ativo");
  const mrr = active.reduce((sum, s) => sum + (s.plan === "anual" ? PLAN_PRICES.anual / 12 : PLAN_PRICES.mensal), 0);
  const annualCount = active.filter(s => s.plan === "anual").length;
  const monthlyCount = active.filter(s => s.plan === "mensal").length;
  const totalRevenue = studios.reduce((sum, s) => sum + s.payments.filter(p => p.status === "pago").reduce((a, p) => a + p.amount, 0), 0);
  return { active: active.length, mrr, annualCount, monthlyCount, totalRevenue, total: studios.length };
}

function billingStatus(s) {
  if (s.planStatus === "cancelado") return "cancelado";
  if (!s.nextBilling) return "ativo";
  const diff = Math.floor((new Date(s.nextBilling) - new Date(todayISO())) / 86400000);
  if (diff < -7) return "bloqueado";
  if (diff < 0) return "pendente";
  if (diff <= 5) return "vencendo";
  return "ativo";
}
const billingLabel = { ativo:"Em dia", vencendo:"Vence em breve", pendente:"Pagamento pendente", bloqueado:"Bloqueado", cancelado:"Cancelado" };
const billingBadge = { ativo:"badge-success", vencendo:"badge-warning", pendente:"badge-gold", bloqueado:"badge-danger", cancelado:"badge-gray" };

}

function AdminStudiosTab({ studios, onChangeStatus, onDeleteStudio, onRenewFree, onMenu }) {
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("todos");
  const [filterStatus, setFilterStatus] = useState("todos");
  const [selected, setSelected] = useState(null);

  const filtered = studios.filter(s => {
    if (filter !== "todos" && s.plan !== filter) return false;
    if (filterStatus !== "todos" && billingStatus(s) !== filterStatus) return false;
    return s.name.toLowerCase().includes(search.toLowerCase()) || s.owner.email.toLowerCase().includes(search.toLowerCase());
  });

  const changeStatus = async (id, status) => {
    await onChangeStatus(id, status);
    setSelected(null);
  };

  const renewFree = async (id) => {
    await onRenewFree(id);
    setSelected(prev => prev && prev.id === id ? { ...prev, nextBilling: addDays(todayISO(), 30), planStatus: "ativo" } : prev);
  };

  const deleteStudio = async (id) => {
    await onDeleteStudio(id);
    setSelected(null);
  };

  return (
    <div>
      <TopBar title="Studios assinantes" onMenu={onMenu} />
      <div style={{ display: "flex", gap: 12, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
        <input type="text" placeholder="Buscar por nome ou e-mail..." value={search} onChange={e => setSearch(e.target.value)} style={{ maxWidth: 280 }} />
        <div style={{ display: "flex", gap: 6 }}>
          {[["todos","Todos"],["mensal","Mensal"],["anual","Anual"]].map(([id,label]) => (
            <button key={id} className={`tab ${filter===id?"active":""}`} onClick={()=>setFilter(id)}>{label}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap"}}>
        {[["todos","Todos"],["ativo","Em dia"],["vencendo","Vence em breve"],["pendente","Pendente"],["bloqueado","Bloqueado"],["cancelado","Cancelado"]].map(([id,label])=>(
          <button key={id} className={`tab ${filterStatus===id?"active":""}`} style={{fontSize:12,padding:"6px 11px"}} onClick={()=>setFilterStatus(id)}>{label}</button>
        ))}
      </div>
      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <div className="table-wrap">
        <table>
          <thead><tr><th>Studio</th><th>Plano</th><th>Pagamento</th><th>Desde</th><th>Próx. cobrança</th><th></th></tr></thead>
          <tbody>
            {filtered.map(s => {
              const bs = billingStatus(s);
              return (
                <tr key={s.id} style={{ cursor: "pointer" }} onClick={() => setSelected(s)}>
                  <td>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <Avatar name={s.name} size={32} />
                      <div>
                        <p style={{ fontWeight: 500 }}>{s.name}</p>
                        <p style={{ fontSize: 12, color: "var(--text-2)" }}>{s.owner.email}</p>
                      </div>
                    </div>
                  </td>
                  <td><span className="badge badge-lilac">{s.plan==="anual"?"Anual":"Mensal"}</span></td>
                  <td><span className={`badge ${billingBadge[bs]}`} style={{fontSize:11}}>{billingLabel[bs]}</span></td>
                  <td style={{ color: "var(--text-2)" }}>{fmtDate(s.createdAt)}</td>
                  <td style={{ color: (bs==="bloqueado"||bs==="pendente")?"var(--danger)":"var(--text-2)" }}>{fmtDate(s.nextBilling)}</td>
                  <td><Icon name="chevronRight" size={16} color="var(--text-2)" /></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
      </div>
      {filtered.length === 0 && <EmptyState icon="building" title="Nenhum studio encontrado" body="Ajuste sua busca ou filtro." />}
      {selected && <StudioDetailModal studio={selected} onClose={()=>setSelected(null)} onChangeStatus={changeStatus} onDelete={deleteStudio} onRenewFree={renewFree} />}
    </div>
  );
}

function AdminConfigTab({ onMenu }) {
  const toast = useToast();
  const [email, setEmail] = useState("");
  const [newPassword, setNewPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    (async () => {
      const { data } = await supabaseClient.auth.getUser();
      setEmail(data?.user?.email || "");
    })();
  }, []);

  const canSave = newPassword.length >= 6 && newPassword === confirmPassword;

  const savePassword = async () => {
    setError("");
    if (newPassword.length < 6) { setError("A senha precisa ter pelo menos 6 caracteres."); return; }
    if (newPassword !== confirmPassword) { setError("As senhas não coincidem."); return; }
    setSaving(true);
    const { error: err } = await supabaseClient.auth.updateUser({ password: newPassword });
    setSaving(false);
    if (err) { setError("Não foi possível trocar a senha. Tente novamente."); return; }
    setNewPassword(""); setConfirmPassword("");
    toast("Senha do administrador atualizada com sucesso");
  };

  return (
    <div>
      <TopBar title="Configurações" onMenu={onMenu} />
      <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 18, maxWidth: 560 }}>
        <div className="card">
          <p style={{ fontWeight: 600, marginBottom: 4 }}>Conta administrativa</p>
          <p style={{ fontSize: 13, color: "var(--text-2)", marginBottom: 16 }}>Login usado para acessar este painel</p>
          <Field label="E-mail de acesso">
            <input type="email" value={email} readOnly style={{ color: "var(--text-2)" }} />
          </Field>
        </div>

        <div className="card">
          <p style={{ fontWeight: 600, marginBottom: 4 }}>Trocar senha</p>
          <p style={{ fontSize: 13, color: "var(--text-2)", marginBottom: 16 }}>Recomendado antes de divulgar o link de venda para o público</p>
          {error && <div className="badge badge-danger" style={{ marginBottom: 14, display: "flex" }}>{error}</div>}
          <Field label="Nova senha">
            <div style={{ position: "relative" }}>
              <input type={showPw ? "text" : "password"} placeholder="Mínimo 6 caracteres" value={newPassword} onChange={e => setNewPassword(e.target.value)} style={{ paddingRight: 42 }} />
              <button onClick={() => setShowPw(!showPw)} style={{ position: "absolute", right: 10, top: 9, background: "none", border: "none", color: "var(--text-2)" }} tabIndex={-1} aria-label={showPw ? "Ocultar senha" : "Mostrar senha"}>
                <Icon name={showPw ? "eyeOff" : "eye"} size={17} />
              </button>
            </div>
          </Field>
          <Field label="Confirmar nova senha">
            <input type={showPw ? "text" : "password"} placeholder="Repita a nova senha" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} />
          </Field>
          <button className="btn btn-primary" onClick={savePassword} disabled={!canSave || saving} style={{ opacity: (canSave && !saving) ? 1 : 0.5 }}>
            {saving ? "Salvando..." : "Salvar nova senha"}
          </button>
        </div>

        <div className="card" style={{ background: "rgba(199,125,255,0.06)", border: "1px solid rgba(199,125,255,0.2)" }}>
          <div style={{ display: "flex", gap: 10 }}>
            <span style={{ color: "var(--lilac)", flexShrink: 0 }}><Icon name="info" size={18} /></span>
            <p style={{ fontSize: 13.5, color: "var(--text-1)", lineHeight: 1.7 }}>
              Antes de divulgar o link de venda na Kiwify ou Cakto, troque essa senha por uma só sua, que mais ninguém saiba.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}


function AdminApp({ onLogout }) {
  const [active, setActive] = useState("visao");
  const [mobileOpen, setMobileOpen] = useState(false);
  const [loading, setLoading] = useState(true);
  const [studios, setStudios] = useState([]);
  const menuProps = { onMenu: () => setMobileOpen(true) };

  const loadStudios = async () => {
    setLoading(true);
    const base = await DB.listAllStudios();
    // Carrega clientes e pagamentos de cada studio para alimentar as métricas do admin.
    const full = await Promise.all(base.map(async (s) => {
      const [clients, payments] = await Promise.all([DB.listClients(s.id), DB.listPayments(s.id)]);
      return { ...s, clients, payments };
    }));
    setStudios(full);
    setLoading(false);
  };

  useEffect(() => { loadStudios(); }, []);

  const setStudiosAndSync = (updater) => {
    setStudios(prev => typeof updater === "function" ? updater(prev) : updater);
  };

  const changeStatus = async (id, status) => {
    await DB.updateStudio(id, { planStatus: status });
    setStudiosAndSync(prev => prev.map(s => s.id === id ? { ...s, planStatus: status } : s));
  };

  const renewFree = async (id) => {
    const nextBilling = addDays(todayISO(), 30);
    await DB.updateStudio(id, { nextBilling, planStatus: "ativo" });
    setStudiosAndSync(prev => prev.map(s => s.id === id ? { ...s, nextBilling, planStatus: "ativo" } : s));
  };

  const deleteStudioAdmin = async (id) => {
    await DB.deleteStudio(id);
    setStudiosAndSync(prev => prev.filter(s => s.id !== id));
  };

  if (loading) return <LoadingScreen />;

  const tabs = {
    visao: <AdminOverview studios={studios} {...menuProps} />,
    studios: <AdminStudiosTab studios={studios} onChangeStatus={changeStatus} onDeleteStudio={deleteStudioAdmin} onRenewFree={renewFree} {...menuProps} />,
    planos: <AdminPlansTab {...menuProps} />,
    pagamentos: <AdminPaymentsTab studios={studios} {...menuProps} />,
    config: <AdminConfigTab {...menuProps} />,
  };

  return (
    <div style={{ display: "flex", width: "100%", maxWidth: "100vw", overflowX: "hidden" }}>
      <AdminSidebar active={active} setActive={setActive} onLogout={onLogout} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
      <div className="main-content" style={{ flex: 1, marginLeft: 250 }}>
        {tabs[active]}
      </div>
    </div>
  );
}

/* ============================================================
   PUBLIC BOOKING PAGE — what the studio's end clients see
   ============================================================ */
function PublicBookingPage({ slug, onGoLanding }) {
  const [loading, setLoading] = useState(true);
  const [studio, setStudio] = useState(null);
  const [services, setServices] = useState([]);
  const [appointments, setAppointments] = useState([]);
  const [serviceId, setServiceId] = useState("");
  const [date, setDate] = useState(todayISO());
  const [time, setTime] = useState("");
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [done, setDone] = useState(false);
  const [submitting, setSubmitting] = useState(false);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const found = await DB.getStudioBySlug(slug);
      if (!found) { setLoading(false); return; }
      const [svcs, appts] = await Promise.all([DB.listServices(found.id), DB.listAppointments(found.id)]);
      setStudio(found);
      setServices(svcs);
      setAppointments(appts);
      setServiceId(svcs[0]?.id || "");
      setLoading(false);
    })();
  }, [slug]);

  if (loading) return <LoadingScreen />;

  if (!studio) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <EmptyState icon="alertTriangle" title="Studio não encontrado" body="Este link de agendamento não existe ou foi removido." action={
          <button className="btn btn-primary" onClick={() => { window.location.hash = ""; onGoLanding(); }}>Voltar para o início</button>
        } />
      </div>
    );
  }

  const days = Array.from({ length: 7 }, (_, i) => addDays(todayISO(), i));
  const timeToMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
    const service = services.find(s => s.id === serviceId);
    const selectedDuration = service?.duration || 30;
    const dayAppointments = appointments.filter(a => a.date === date && a.status !== "cancelado");
    const slots = ["09:00", "10:00", "11:00", "13:00", "14:00", "15:00", "16:00", "17:00"];
    const isSlotTaken = (t) => {
      const startNew = timeToMin(t);
      const endNew = startNew + selectedDuration;
      return dayAppointments.some(a => {
        const aService = services.find(s => s.id === a.serviceId);
        const dur = aService?.duration || 30;
        const startExisting = timeToMin(a.time);
        const endExisting = startExisting + dur;
        return startNew < endExisting && endNew > startExisting;
      });
    }; 
  const canBook = serviceId && date && time && name.trim().length >= 2 && phone.trim().length >= 8;

  const confirm = async () => {
    setSubmitting(true);
    try {
      const client = await DB.createClient(studio.id, { name, phone });
      await DB.createAppointment(studio.id, { clientId: client.id, serviceId, date, time, status: "pendente" });
      setDone(true);
    } catch (e) {
      setSubmitting(false);
    }
  };

  if (done) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div className="card" style={{ maxWidth: 420, textAlign: "center", padding: 36 }}>
          <div style={{ width: 56, height: 56, borderRadius: "50%", background: "rgba(127,217,168,0.14)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", color: "var(--success)" }}>
            <Icon name="check" size={26} />
          </div>
          <h2 className="serif" style={{ fontSize: 22, marginBottom: 10 }}>Agendamento recebido!</h2>
          <p style={{ color: "var(--text-1)", marginBottom: 18, fontSize: 14.5 }}>
           {service?.name} no dia {fmtDate(date)} às {time}. Recebemos seu pedido — o studio vai confirmar em breve. Guarde essa data, e fique de olho no WhatsApp.
          </p>
         <div className="badge badge-warning"><Icon name="clock" size={13} /> Aguardando confirmação</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", padding: "0 0 60px" }}>
      <div style={{ borderBottom: "1px solid var(--line)", padding: "22px 0" }}>
        <div className="container" style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <Avatar name={studio.name} size={42} tone="gold" />
          <div>
            <p className="serif" style={{ fontSize: 19, fontWeight: 500 }}>{studio.name}</p>
            <p style={{ fontSize: 12.5, color: "var(--text-2)" }}>Agende seu horário online</p>
          </div>
        </div>
      </div>

      <div className="container" style={{ maxWidth: 560, paddingTop: 32 }}>
        <p style={{ fontSize: 13, fontWeight: 600, color: "var(--text-2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>1. Escolha o serviço</p>
        {services.length === 0 ? (
          <p style={{ fontSize: 13.5, color: "var(--text-2)", marginBottom: 28 }}>Este studio ainda não cadastrou serviços.</p>
        ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 28 }}>
          {services.map(s => (
            <button key={s.id} onClick={() => setServiceId(s.id)} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 16px", borderRadius: 12, textAlign: "left",
              border: serviceId === s.id ? "2px solid var(--lilac)" : "1px solid var(--line-strong)",
              background: serviceId === s.id ? "rgba(199,125,255,0.06)" : "var(--bg-1)",
            }}>
              <div>
                <p style={{ fontWeight: 500, fontSize: 14.5 }}>{s.name}</p>
                <p style={{ fontSize: 12.5, color: "var(--text-2)" }}>{s.duration} min</p>
              </div>
              <span style={{ fontWeight: 600, color: "var(--gold)" }}>{fmtBRL(s.price)}</span>
            </button>
          ))}
        </div>
        )}

        <p style={{ fontSize: 13, fontWeight: 600, color: "var(--text-2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>2. Escolha o dia</p>
        <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 24, paddingBottom: 4 }}>
          {days.map(d => (
            <button key={d} onClick={() => { setDate(d); setTime(""); }} style={{
              flexShrink: 0, minWidth: 64, padding: "9px 4px", borderRadius: 10, textAlign: "center",
              border: date === d ? "2px solid var(--lilac)" : "1px solid var(--line-strong)",
              background: date === d ? "rgba(199,125,255,0.08)" : "var(--bg-1)",
            }}>
              <p style={{ fontSize: 10.5, color: "var(--text-2)", textTransform: "uppercase" }}>{fmtDateLong(d).split(" ")[0].replace(".", "")}</p>
              <p style={{ fontSize: 16, fontWeight: 600 }}>{d.slice(8, 10)}</p>
            </button>
          ))}
        </div>

        <p style={{ fontSize: 13, fontWeight: 600, color: "var(--text-2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>3. Escolha o horário</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 28 }}>
          {slots.map(t => {
            const taken = takenTimes.includes(t);
            return (
              <button key={t} disabled={taken} onClick={() => setTime(t)} style={{
                padding: "10px 4px", borderRadius: 10, fontSize: 13.5, fontWeight: 500,
                border: time === t ? "2px solid var(--lilac)" : "1px solid var(--line-strong)",
                background: taken ? "var(--bg-1)" : time === t ? "rgba(199,125,255,0.08)" : "var(--bg-card)",
                color: taken ? "var(--text-2)" : "var(--text-0)",
                opacity: taken ? 0.45 : 1, textDecoration: taken ? "line-through" : "none",
              }}>{t}</button>
            );
          })}
        </div>

        <p style={{ fontSize: 13, fontWeight: 600, color: "var(--text-2)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 12 }}>4. Seus dados</p>
        <Field label="Nome completo"><input type="text" placeholder="Seu nome" value={name} onChange={e => setName(e.target.value)} /></Field>
        <Field label="WhatsApp"><input type="tel" placeholder="11 99999-0000" value={phone} onChange={e => setPhone(e.target.value)} /></Field>

        <div className="card" style={{ background: "var(--bg-1)", marginBottom: 20, fontSize: 13, color: "var(--text-1)", display: "flex", gap: 8 }}>
          <Icon name="whatsapp" size={16} style={{ color: "var(--success)", flexShrink: 0 }} />
          Seu WhatsApp fica salvo para o studio confirmar o horário com você, se precisar.
        </div>

        <button className="btn btn-primary btn-block" disabled={!canBook || submitting} style={{ opacity: (canBook && !submitting) ? 1 : 0.5 }} onClick={confirm}>
          {submitting ? "Confirmando..." : "Confirmar agendamento"}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP — routing between landing, auth, studio app, admin app
   ============================================================ */
function LoadingScreen() {
  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ width: 36, height: 36, borderRadius: "50%", border: "3px solid var(--bg-2)", borderTopColor: "var(--lilac)", animation: "spin 0.8s linear infinite" }} />
      <style>{`@keyframes spin{ to{ transform:rotate(360deg); } }`}</style>
    </div>
  );
}

function Root() {
  const [booted, setBooted] = useState(false);
  const [view, setView] = useState("landing"); // landing | signup | login | adminLogin | studio | admin | public
  const [signupPlan, setSignupPlan] = useState("mensal");
  const [authUser, setAuthUser] = useState(null); // usuário logado no Supabase Auth
  const [isAdmin, setIsAdmin] = useState(false);
  const [currentStudio, setCurrentStudio] = useState(null);
  const [publicSlug, setPublicSlug] = useState(null);
  const [toast, setToast] = useState(null);

  // boot: lê a rota (link público de agendamento) e a sessão real do Supabase Auth.
  useEffect(() => {
    (async () => {
      const hash = window.location.hash;
      if (hash.startsWith("#/book/")) {
        setPublicSlug(hash.replace("#/book/", ""));
        setView("public");
        setBooted(true);
        return;
      }
      if (hash.startsWith("#/ativar")) {
        setView("activate");
        setBooted(true);
        return;
      }
      const { data } = await supabaseClient.auth.getSession();
      const user = data?.session?.user || null;
      if (user) {
        await resolveSession(user);
      }
      setBooted(true);
    })();

    const { data: sub } = supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (event === "SIGNED_OUT") {
        setAuthUser(null); setIsAdmin(false); setCurrentStudio(null);
      }
    });
    return () => sub?.subscription?.unsubscribe();
  }, []);

  // Dado um usuário autenticado, descobre se é admin da plataforma ou dono de um estúdio.
  const resolveSession = async (user) => {
    setAuthUser(user);
    const admin = await DB.isPlatformAdmin(user.id);
    if (admin) {
      setIsAdmin(true);
      setView("admin");
      return;
    }
    const studio = await DB.getStudioByOwner(user.id, user.email);
    if (studio) {
      setCurrentStudio(studio);
      setView("studio");
    }
  };

  useEffect(() => {
    if (toast) {
      const t = setTimeout(() => setToast(null), 3200);
      return () => clearTimeout(t);
    }
  }, [toast]);

  if (!booted) return <LoadingScreen />;

  const goLanding = () => { setView("landing"); };
  const KIWIFY_CHECKOUT_LINKS = {
    mensal: "https://pay.kiwify.com.br/g4e96d9",
    anual: "https://pay.kiwify.com.br/Gpdsk9L",
  };
  const goSignup = (plan) => {
    const planKey = plan && typeof plan === "string" && KIWIFY_CHECKOUT_LINKS[plan] ? plan : "mensal";
    window.location.href = KIWIFY_CHECKOUT_LINKS[planKey];
  };
  const goLogin = () => setView("login");
  const goAdminLogin = () => setView("adminLogin");

  const handleSignupComplete = async ({ studioName, ownerName, email, password, plan, payMethod }) => {
    const { data, error } = await supabaseClient.auth.signUp({
      email, password,
      options: { data: { full_name: ownerName } },
    });
    if (error) throw error;
    const user = data.user;
    if (!user) throw new Error("Não foi possível criar a conta. Verifique seu e-mail para confirmar o cadastro.");

    const slugBase = slugify(studioName) || "studio";
    let slug = slugBase, n = 1, exists = true;
    while (exists) {
      const found = await DB.getStudioBySlug(slug);
      if (!found) { exists = false; } else { slug = `${slugBase}-${n++}`; }
    }

    const studio = await DB.createStudio({ ownerId: user.id, ownerEmail: email, ownerName, studioName, slug, plan });
    await DB.createPayment(studio.id, {
      label: `Assinatura Agenda Glow — Plano ${plan === "anual" ? "Anual" : "Mensal"}`,
      amount: plan === "anual" ? PLAN_PRICES.anual : PLAN_PRICES.mensal,
      method: payMethod, status: "pago", source: "manual",
    });

    setCurrentStudio(studio);
    setAuthUser(user);
    setView("studio");
    setToast({ msg: `Bem-vinda à Agenda Glow! Plano ${plan === "anual" ? "anual" : "mensal"} ativado.`, type: "success", key: uid("t") });
  };

  const handleStudioLogin = async (email, password) => {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error || !data.user) return { ok: false, message: "E-mail ou senha incorretos." };
    const studio = await DB.getStudioByOwner(data.user.id, data.user.email);
    if (!studio) {
      await supabaseClient.auth.signOut();
      return { ok: false, message: "Esta conta não tem nenhum studio cadastrado." };
    }
    setAuthUser(data.user);
    setCurrentStudio(studio);
    setView("studio");
    return { ok: true };
  };

  const handleAdminLogin = async (email, password) => {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error || !data.user) return { ok: false, message: "E-mail ou senha incorretos." };
    const admin = await DB.isPlatformAdmin(data.user.id);
    if (!admin) {
      await supabaseClient.auth.signOut();
      return { ok: false, message: "Esta conta não tem acesso administrativo." };
    }
    setAuthUser(data.user);
    setIsAdmin(true);
    setView("admin");
    return { ok: true };
  };

  const logout = async () => {
    await supabaseClient.auth.signOut();
    setAuthUser(null); setIsAdmin(false); setCurrentStudio(null);
    setView("landing");
  };

  const ctx = { toast, setToast };

  let content;
  if (view === "public") {
    content = <PublicBookingPage slug={publicSlug} onGoLanding={goLanding} />;
  } else if (view === "activate") {
    content = <ActivateAccountScreen onBack={goLanding} onActivated={() => { window.location.hash = ""; goLogin(); }} />;
  } else if (view === "signup") {
    content = <SignupScreen initialPlan={signupPlan} onBack={goLanding} onComplete={handleSignupComplete} />;
  } else if (view === "login") {
    content = <LoginScreen onBack={goLanding} onLogin={handleStudioLogin} role="studio" />;
  } else if (view === "adminLogin") {
    content = <LoginScreen onBack={goLanding} onLogin={handleAdminLogin} role="admin" />;
  } else if (view === "studio" && currentStudio) {
    content = <StudioApp studio={currentStudio} setStudio={setCurrentStudio} onLogout={logout} />;
  } else if (view === "admin" && isAdmin) {
    content = <AdminApp onLogout={logout} />;
  } else {
    content = <LandingPage onLogin={goLogin} onSignup={goSignup} onAdminLogin={goAdminLogin} />;
  }

  return (
    <AppCtx.Provider value={ctx}>
      {content}
      <Toast toast={toast} />
    </AppCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
</script>

<script>
(function() {
  let deferredPrompt = null;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const dismissed = sessionStorage.getItem('pwa-dismissed');

  if (isInStandalone || dismissed) return;

  if (isIOS) {
    setTimeout(() => {
      const b = document.getElementById('ios-banner');
      if (b) b.style.display = 'block';
    }, 4000);
    document.getElementById('ios-dismiss-btn')?.addEventListener('click', () => {
      document.getElementById('ios-banner').style.display = 'none';
      sessionStorage.setItem('pwa-dismissed', '1');
    });
  } else {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => {
        const b = document.getElementById('pwa-banner');
        if (b) b.style.display = 'flex';
      }, 4000);
    });

    document.getElementById('pwa-install-btn')?.addEventListener('click', () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('pwa-banner').style.display = 'none';
      });
    });

    document.getElementById('pwa-dismiss-btn')?.addEventListener('click', () => {
      document.getElementById('pwa-banner').style.display = 'none';
      sessionStorage.setItem('pwa-dismissed', '1');
    });
  }
})();
</script>
